    name: MIT
    url: https://opensource.org/licenses/MIT
  title: HRHub API
  version: "1.0"
paths:
  /attendance:
    get:
      description: 'Get attendances by date (default: today)'
      parameters:
      - description: Date (YYYY-MM-DD)
        in: query
        name: date
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              additionalProperties: true
              type: object
            type: array
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List attendances
      tags:
      - Attendance
    post:
      consumes:
      - application/json
      description: Create a new attendance record
      parameters:
      - description: Attendance details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.CreateAttendanceRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create attendance
      tags:
      - Attendance
  /attendance/{id}:
