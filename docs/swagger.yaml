basePath: /api/v1
definitions:
  handlers.ClockInRequest:
    properties:
      employee_id:
        type: string
      shift_id:
        type: string
    required:
    - employee_id
    type: object
  handlers.ClockOutRequest:
    properties:
      employee_id:
        type: string
    required:
    - employee_id
    type: object
  handlers.CreateAttendanceRequest:
    properties:
      check_in:
        type: string
      check_out:
        type: string
      company_id:
        type: string
      date:
        type: string
      employee_id:
        type: string
      shift_id:
        type: string
      status:
        type: string
    required:
    - company_id
    - date
    - employee_id
    type: object
  handlers.CreateCompanyRequest:
    properties:
      address:
        type: string
      company_name_bn:
        type: string
      company_name_en:
        type: string
      phone:
        type: string
    required:
    - company_name_bn
    - company_name_en
    type: object
  handlers.CreateShiftRequest:
    properties:
      company_id:
        type: string
      end_time:
        type: string
      late_grace_minutes:
        type: integer
      name:
        type: string
      start_time:
        type: string
    required:
    - company_id
    - end_time
    - name
    - start_time
    type: object
  handlers.ImportRequest:
    properties:
      file_path:
        type: string
    type: object
  handlers.ProcessRequest:
    properties:
      date:
        type: string
    type: object
  handlers.RegisterRequest:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        minLength: 12
        type: string
    required:
    - email
    - name
    - password
    type: object
  handlers.UpdateCompanyRequest:
    properties:
      address:
        type: string
      company_name_bn:
        type: string
      company_name_en:
        type: string
      phone:
        type: string
    required:
    - company_name_bn
    - company_name_en
    type: object
  handlers.UpdateShiftRequest:
    properties:
      company_id:
        type: string
      end_time:
        type: string
      late_grace_minutes:
        type: integer
      name:
        type: string
      start_time:
        type: string
    required:
    - company_id
    - end_time
    - name
    - start_time
    type: object
  service.LoginRequest:
    properties:
      email:
        type: string
      mfa_code:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  service.LoginResponse:
    properties:
      access_token:
        type: string
      expires_in:
        type: integer
      refresh_token:
        type: string
      user:
        $ref: '#/definitions/service.UserResponse'
    type: object
  service.UserResponse:
    properties:
      email:
        type: string
      id:
        type: string
      name:
        type: string
      status:
        type: string
    type: object
host: localhost:3000
info:
  contact:
    email: support@hrhub.com
    name: HRHub Team
  description: Enterprise HR Management & Payroll System API.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  title: HRHub API
  version: "1.0"
paths:
  /attendance:
    get:
      description: 'Get attendances by date (default: today)'
      parameters:
      - description: Date (YYYY-MM-DD)
        in: query
        name: date
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              additionalProperties: true
              type: object
            type: array
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List attendances
      tags:
      - Attendance
    post:
      consumes:
      - application/json
      description: Create a new attendance record
      parameters:
      - description: Attendance details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.CreateAttendanceRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create attendance
      tags:
      - Attendance
  /attendance/{id}:
