        type: string
      nationality:
        type: string
      nid:
        type: string
      number_of_dependents:
        type: integer
      other_allowance:
        type: number
      permanent_address:
        type: string
      permanent_district_id:
        type: string
      permanent_division_id:
        description: Address (permanent)
        type: string
      permanent_union_id:
        type: string
      permanent_upazila_id:
        type: string
      phone:
        type: string
      present_address:
        type: string
      present_district_id:
        type: string
      present_division_id:
        description: Address (present)
        type: string
      present_union_id:
        type: string
      present_upazila_id:
        type: string
      provident_fund:
