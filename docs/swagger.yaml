  handlers.UpdateFloorRequest:
    properties:
      name:
        type: string
    required:
    - name
    type: object
  handlers.UpdateGroupRequest:
    properties:
      name:
        type: string
    required:
    - name
    type: object
  handlers.UpdateLeaveRequest:
    properties:
      from_date:
        type: string
      leave_type_id:
        type: string
      reason:
        type: string
      to_date:
        type: string
      total_days:
        type: integer
    type: object
  handlers.UpdateLeaveTypeRequest:
    properties:
      applicable_gender:
        type: string
      carry_forward_days:
        type: integer
      name:
        type: string
      status:
        type: string
      total_days:
        type: integer
    required:
    - name
    - total_days
    type: object
  handlers.UpdateShiftRequest:
    properties:
      company_id:
        type: string
      end_time:
        type: string
      late_grace_minutes:
        type: integer
      name:
        type: string
      shift_type:
        type: string
      start_time:
        type: string
      weekend_days:
        type: string
    required:
    - company_id
    - end_time
    - name
    - start_time
    type: object
  service.LoginRequest:
    properties:
      email:
        type: string
      mfa_code:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  service.LoginResponse:
    properties:
      access_token:
        type: string
      expires_in:
        type: integer
      refresh_token:
        type: string
      user:
        $ref: '#/definitions/service.UserResponse'
    type: object
  service.UserResponse:
    properties:
      email:
        type: string
      id:
        type: string
      name:
        type: string
      status:
        type: string
    type: object
host: localhost:5000
info:
  contact:
    email: support@hrhub.com
    name: HRHub Team
  description: Enterprise HR Management & Payroll System API.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  title: HRHub API
  version: "1.0"
paths:
  /attendance:
    get:
      description: 'Get attendances by date (default: today)'
      parameters:
      - description: Date (YYYY-MM-DD)
        in: query
        name: date
        type: string
      - description: Filter by company
        in: query
        name: company_id
        type: string
      - description: Filter by department
        in: query
        name: department_id
        type: string
      - description: Filter by section
        in: query
        name: section_id
        type: string
      - description: Filter by designation
        in: query
        name: designation_id
        type: string
      - description: Filter by line
        in: query
        name: line_id
        type: string
      - description: Filter by group
        in: query
        name: group_id
        type: string
      - description: Filter by shift
        in: query
        name: shift_id
        type: string
      - description: Filter by status
        in: query
        name: status
        type: string
      - description: Filter by employee
        in: query
        name: employee_id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              additionalProperties: true
              type: object
            type: array
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List attendances
      tags:
      - Attendance
    post:
      consumes:
      - application/json
      description: Create a new attendance record
      parameters:
      - description: Attendance details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.CreateAttendanceRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create attendance
      tags:
      - Attendance
  /attendance/{id}:
    delete:
      description: Soft delete an attendance record
      parameters:
      - description: Attendance ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete attendance
      tags:
      - Attendance
    get:
      description: Get an attendance record by its ID
      parameters:
      - description: Attendance ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get attendance by ID
      tags:
      - Attendance
    put:
      consumes:
      - application/json
      description: Update an attendance record
      parameters:
      - description: Attendance ID
        in: path
        name: id
        required: true
        type: string
      - description: Updated attendance details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.CreateAttendanceRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update attendance
      tags:
      - Attendance
  /attendance/absent:
    get:
      description: Get employees marked as absent for a date range
