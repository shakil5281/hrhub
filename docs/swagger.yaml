basePath: /api/v1
definitions:
  handlers.ApplyLeaveRequest:
    properties:
      company_id:
        type: string
      employee_id:
        type: string
      from_date:
        type: string
      leave_type_id:
        type: string
      reason:
        type: string
      to_date:
        type: string
    required:
    - company_id
    - employee_id
    - from_date
    - leave_type_id
    - to_date
    type: object
  handlers.ClockInRequest:
    properties:
      employee_id:
        type: string
      shift_id:
        type: string
    required:
    - employee_id
    type: object
  handlers.ClockOutRequest:
    properties:
      employee_id:
        type: string
    required:
    - employee_id
    type: object
  handlers.CreateAttendanceRequest:
    properties:
      check_in:
        type: string
      check_out:
        type: string
      company_id:
        type: string
      date:
        type: string
      employee_id:
        type: string
      shift_id:
        type: string
      status:
        type: string
    required:
    - company_id
    - date
    - employee_id
    type: object
  handlers.CreateCompanyRequest:
    properties:
      address:
        type: string
      company_name_bn:
        type: string
      company_name_en:
        type: string
      phone:
        type: string
      status:
        type: string
    required:
    - company_name_en
    type: object
  handlers.CreateEmployeeRequest:
