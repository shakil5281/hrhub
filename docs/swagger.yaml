host: localhost:5000
info:
  contact:
    email: support@peoplehub.com
    name: PeopleHub Team
  description: Enterprise HR Management & Payroll System API.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  title: PeopleHub API
  version: "1.1"
paths:
  /attendance:
    get:
      description: 'Get attendances by date (default: today)'
      parameters:
      - description: Date (YYYY-MM-DD)
        in: query
        name: date
        type: string
      - description: Filter by company
        in: query
        name: company_id
        type: string
      - description: Filter by department
        in: query
        name: department_id
        type: string
      - description: Filter by section
        in: query
        name: section_id
        type: string
      - description: Filter by designation
        in: query
        name: designation_id
        type: string
      - description: Filter by line
        in: query
        name: line_id
        type: string
      - description: Filter by group
        in: query
        name: group_id
        type: string
      - description: Filter by shift
        in: query
        name: shift_id
        type: string
      - description: Filter by status
        in: query
        name: status
        type: string
      - description: Filter by employee
        in: query
        name: employee_id
        type: string
      - description: 'Page number (default: 1)'
        in: query
        name: page
        type: integer
      - description: 'Page size (default: 20, max: 100)'
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.PaginatedResponse'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List attendances
      tags:
      - Attendance
    post:
      consumes:
      - application/json
      description: Create a new attendance record
      parameters:
      - description: Attendance details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.CreateAttendanceRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create attendance
      tags:
      - Attendance
  /attendance/{id}:
    delete:
      description: Soft delete an attendance record
      parameters:
      - description: Attendance ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete attendance
      tags:
      - Attendance
    get:
      description: Get an attendance record by its ID
      parameters:
      - description: Attendance ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get attendance by ID
      tags:
      - Attendance
    put:
      consumes:
      - application/json
      description: Update an attendance record
      parameters:
      - description: Attendance ID
        in: path
        name: id
        required: true
        type: string
      - description: Updated attendance details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.CreateAttendanceRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update attendance
      tags:
      - Attendance
  /attendance/absent:
    get:
      description: Get employees marked as absent for a date range
      parameters:
      - description: Start date (YYYY-MM-DD)
        in: query
        name: start_date
        type: string
      - description: End date (YYYY-MM-DD)
        in: query
        name: end_date
        type: string
      - description: Filter by company
        in: query
        name: company_id
        type: string
      - description: Filter by department
        in: query
