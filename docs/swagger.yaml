      grade:
        type: string
      group_id:
        type: string
      group_name:
        type: string
      house_rent:
        type: number
      joining_date:
        type: string
      line:
        type: string
      line_id:
        type: string
      marital_status:
        type: string
      medical_allowance:
        type: number
      mother_name:
        type: string
      name_bn:
        type: string
      name_en:
