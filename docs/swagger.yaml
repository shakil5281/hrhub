basePath: /api/v1
definitions:
  handlers.ClockInRequest:
    properties:
      employee_id:
        type: string
      shift_id:
        type: string
    required:
    - employee_id
    type: object
  handlers.ClockOutRequest:
    properties:
      employee_id:
        type: string
    required:
    - employee_id
    type: object
  handlers.CreateAttendanceRequest:
    properties:
      check_in:
        type: string
      check_out:
        type: string
      company_id:
        type: string
      date:
        type: string
      employee_id:
        type: string
      shift_id:
        type: string
      status:
        type: string
    required:
    - company_id
    - date
    - employee_id
    type: object
  handlers.CreateCompanyRequest:
    properties:
      address:
        type: string
      company_name_bn:
        type: string
      company_name_en:
        type: string
      phone:
        type: string
      status:
        type: string
    required:
    - company_name_en
    type: object
  handlers.CreateEmployeeRequest:
    properties:
      bank_account:
        type: string
      bank_branch:
        type: string
      bank_name:
        description: Bank
        type: string
      basic_salary:
        description: Salary
        type: number
      blood_group:
        type: string
      branch_id:
        type: string
      company_id:
        description: Office
        type: string
      date_of_birth:
        type: string
      department_id:
        type: string
      designation:
        type: string
      email:
        type: string
      emergency_contact:
        type: string
      emergency_phone:
        type: string
      employee_code:
        type: string
      father_name:
        type: string
      food_allowance:
        type: number
      gender:
        type: string
      grade:
        type: string
      group_name:
        type: string
      house_rent:
        type: number
      joining_date:
        type: string
      line:
        type: string
      marital_status:
        type: string
      medical_allowance:
        type: number
      mother_name:
        type: string
      name_bn:
        type: string
      name_en:
        description: Personal
        type: string
      nationality:
        type: string
      nid:
        type: string
      number_of_dependents:
        type: integer
      other_allowance:
        type: number
      permanent_address:
        type: string
      phone:
        type: string
      present_address:
        type: string
      provident_fund:
        type: number
      punch_number:
        type: string
      reports_to:
        type: string
      routing_no:
        type: string
      section:
        type: string
      shift_id:
        type: string
      spouse_name:
        description: Family
        type: string
      status:
        description: Status
        type: string
      swift_code:
        type: string
      tax:
        type: number
      total_salary:
        type: number
      transport_allowance:
        type: number
    required:
    - company_id
    - employee_code
    - joining_date
    type: object
  handlers.CreateShiftRequest:
    properties:
      company_id:
        type: string
      end_time:
        type: string
      late_grace_minutes:
        type: integer
      name:
        type: string
      shift_type:
        type: string
      start_time:
        type: string
      weekend_days:
        type: string
    required:
    - company_id
    - end_time
    - name
    - start_time
    type: object
  handlers.ImportRequest:
    properties:
      end_date:
        description: YYYY-MM-DD, optional
        type: string
      file_path:
        type: string
      start_date:
        description: YYYY-MM-DD, optional
        type: string
    type: object
  handlers.ProcessRequest:
    properties:
      company_id:
        type: string
      date:
        type: string
      end_date:
        type: string
      start_date:
        type: string
    type: object
  handlers.RegisterRequest:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        minLength: 12
        type: string
    required:
    - email
    - name
    - password
    type: object
  handlers.UpdateCompanyRequest:
    properties:
      address:
        type: string
      company_name_bn:
        type: string
      company_name_en:
        type: string
      phone:
        type: string
      status:
        type: string
    required:
    - company_name_en
    type: object
  handlers.UpdateShiftRequest:
    properties:
      company_id:
        type: string
      end_time:
        type: string
      late_grace_minutes:
        type: integer
      name:
        type: string
      shift_type:
        type: string
      start_time:
        type: string
      weekend_days:
        type: string
    required:
    - company_id
    - end_time
    - name
    - start_time
    type: object
  service.LoginRequest:
    properties:
      email:
        type: string
      mfa_code:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  service.LoginResponse:
    properties:
      access_token:
        type: string
      expires_in:
        type: integer
      refresh_token:
        type: string
      user:
        $ref: '#/definitions/service.UserResponse'
    type: object
  service.UserResponse:
    properties:
      email:
        type: string
      id:
        type: string
      name:
        type: string
      status:
        type: string
    type: object
host: localhost:5000
info:
  contact:
    email: support@hrhub.com
    name: HRHub Team
  description: Enterprise HR Management & Payroll System API.
