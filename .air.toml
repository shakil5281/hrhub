root = "."
tmp_dir = "tmp"

[build]
  bin = "./tmp/main.exe"
  cmd = "go build -o ./tmp/main.exe ./cmd/server"
  delay = 1000
  exclude_dir = ["tmp", "uploads", "backups", "docs", "web", "node_modules", ".git"]
  exclude_regex = ["_test\\.go$"]
  include_ext = ["go", "toml", "yaml"]
  kill_delay = "0s"
  send_interrupt = false
  stop_on_error = true

[log]
  time = false

[misc]
  clean_on_exit = true
